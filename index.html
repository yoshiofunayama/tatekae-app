<style>
:root{
  --paper:#F7F3EC; --card:#FFFDF8; --ink:#2B2722; --muted:#8A8073;
  --line:#E5DCCD; --clay:#C2683E; --clay-soft:#F0E2D8; --total:#9A4E2C;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#211E1A; --card:#2A2620; --ink:#F2EBDF; --muted:#A99F8E;
    --line:#3B362E; --clay:#D9885E; --clay-soft:#3A2C24; --total:#E7A57E;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Zen Kaku Gothic New","Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
  font-size:16px; line-height:1.6;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:440px;margin:0 auto;padding:22px 18px 40px}
header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.logo{width:34px;height:34px;border-radius:9px;flex:none}
h1{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:20px;margin:0;letter-spacing:.02em}
.sub{font-size:12px;color:var(--muted);margin-top:1px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:6px 16px;margin-bottom:16px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
label{font-size:15px}
.hint{display:block;font-size:11px;color:var(--muted);margin-top:1px}
.field{display:flex;align-items:center;gap:5px}
.field span{font-size:14px;color:var(--muted)}
input[type=number]{
  font-family:inherit;font-size:17px;text-align:right;
  width:108px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;
  background:var(--paper);color:var(--ink);outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input#month{width:62px}
input[type=number]:focus{border-color:var(--clay);box-shadow:0 0 0 3px var(--clay-soft)}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.section-h{font-family:"Zen Maru Gothic",sans-serif;font-weight:500;font-size:13px;color:var(--muted);margin:0 4px 7px;display:flex;align-items:center;gap:6px}
details{margin-bottom:16px}
summary{list-style:none;cursor:pointer;font-size:13px;color:var(--muted);padding:8px 4px;display:flex;align-items:center;gap:6px}
summary::-webkit-details-marker{display:none}
summary .chev{transition:transform .2s}
details[open] summary .chev{transform:rotate(90deg)}
.setup-note{font-size:12px;color:var(--muted);margin:11px 2px;line-height:1.6}
.saved{color:var(--clay);margin-left:6px;opacity:0;transition:opacity .3s;font-weight:500}
.total-card{background:var(--clay);border-radius:16px;padding:16px 20px;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.total-card .l{color:#FBEFE6;font-size:13px;font-family:"Zen Maru Gothic",sans-serif}
.total-card .v{color:#fff;font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:27px;letter-spacing:.01em}
pre.out{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:0 0 14px;color:var(--ink);overflow-wrap:anywhere}
button.copy{width:100%;font-family:"Zen Maru Gothic",sans-serif;font-weight:500;font-size:16px;padding:15px;border:none;border-radius:14px;background:var(--clay);color:#fff;cursor:pointer;transition:transform .1s, background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
button.copy:active{transform:scale(.985)}
button.copy.done{background:var(--total)}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:22px;line-height:1.7}
svg{display:block}
</style>
</head>

    <div>
      <h1>立替金メモ</h1>
      <div class="sub">数字を入れてコピーするだけ</div>
    </div>
  </header>

  <div class="section-h">今月の入力</div>
  <div class="card">
    <div class="row">
      <label for="month">何月分</label>
      <div class="field"><input id="month" type="number" inputmode="numeric" min="1" max="12" placeholder="0"><span>月</span></div>
    </div>
    <div class="row">
      <label for="food">食費<span class="hint">折半前の総額（自動で半分にします）</span></label>
      <div class="field"><input id="food" type="number" inputmode="numeric" min="0" placeholder="0"><span>円</span></div>
    </div>
    <div class="row">
      <label for="gas">電気・ガス</label>
      <div class="field"><input id="gas" type="number" inputmode="numeric" min="0" placeholder="0"><span>円</span></div>
    </div>
    <div class="row">
      <label for="water">水道</label>
      <div class="field"><input id="water" type="number" inputmode="numeric" min="0" placeholder="0"><span>円</span></div>
    </div>
    <div class="row">
      <label for="offset">相殺<span class="hint">差し引く額</span></label>
      <div class="field"><span>−</span><input id="offset" type="number" inputmode="numeric" min="0" placeholder="0"><span>円</span></div>
    </div>
  </div>

  <details id="fixedBox">
    <summary><svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>固定費（変わったら変更／自動で記憶します）</summary>
    <div class="card" style="margin-top:8px">
      <p class="setup-note">最初に一度だけ家賃とインターネットを設定すれば、この端末に記憶され、次回から自動で入ります。<span class="saved" id="savedNote">✓ 保存しました</span></p>
      <div class="row">
        <label for="net">インターネット</label>
        <div class="field"><input id="net" type="number" inputmode="numeric" min="0"><span>円</span></div>
      </div>
      <div class="row">
        <label for="rent">家賃</label>
        <div class="field"><input id="rent" type="number" inputmode="numeric" min="0"><span>円</span></div>
      </div>
    </div>
  </details>

  <div class="total-card">
    <span class="l">立替金の合計</span>
    <span class="v" id="total">0円</span>
  </div>

  <pre class="out" id="output"></pre>

  <button class="copy" id="copyBtn">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    <span id="btnLabel">コピーする</span>
  </button>

  <div class="foot">ホーム画面に追加すると毎月ワンタップで開けます<br>入力した固定費はこの端末に保存されます</div>
</div>

  var btn=document.getElementById("copyBtn");
  var btnLabel=document.getElementById("btnLabel");
  var savedNote=document.getElementById("savedNote");
  var fixedBox=document.getElementById("fixedBox");

  function valid(v){return v!=null && v!=="" && !isNaN(v);}

  var saved={};
  try{saved=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){}
  el.net.value = valid(saved.net) ? saved.net : DEF.net;
  el.rent.value = valid(saved.rent) ? saved.rent : DEF.rent;
  // 初回（まだ保存がない）は固定費を開いて設定をうながす
  if(!(valid(saved.net) || valid(saved.rent))){ fixedBox.open=true; }

  function num(id){var v=parseInt(el[id].value,10);return isNaN(v)?0:v;}
  function yen(n){return n.toLocaleString("ja-JP")+"円";}

  function build(){
    var m=num("month");
    var foodHalf=Math.round(num("food")/2);
    var gas=num("gas"),water=num("water"),offset=num("offset");
    var net=num("net"),rent=num("rent");
    var total=net+gas+water+foodHalf+rent-offset;
    var t=
      "==="+m+"月分立替金===\n"+
      yen(total)+"\n"+
      "===============\n"+
      "内訳\n"+
      "・インターネット："+yen(net)+"\n"+
      "・電気・ガス："+yen(gas)+"\n"+
      "・水道："+yen(water)+"\n"+
      "・食費など："+yen(foodHalf)+"\n"+
      "・家賃："+yen(rent)+"\n"+
      "・相殺：-"+yen(offset);
    out.textContent=t;
    totalEl.textContent=yen(total);
    return t;
  }

  var noteTimer;
  function saveFixed(){
    var obj={};
    if(el.net.value!=="") obj.net=num("net");
    if(el.rent.value!=="") obj.rent=num("rent");
    try{localStorage.setItem(KEY,JSON.stringify(obj));}catch(e){}
    savedNote.style.opacity="1";
    clearTimeout(noteTimer);
    noteTimer=setTimeout(function(){savedNote.style.opacity="0";},1400);
  }

  ids.forEach(function(id){el[id].addEventListener("input",function(){
    build(); if(id==="net"||id==="rent") saveFixed();
  });});

  // 空欄のままフォーカスを外したら初期値に戻す（0固定を防ぐ）
  ["net","rent"].forEach(function(id){
    el[id].addEventListener("blur",function(){
      if(el[id].value===""){ el[id].value=DEF[id]; build(); saveFixed(); }
    });
  });

  btn.addEventListener("click",function(){
    var text=build();
    function done(){
      btn.classList.add("done"); btnLabel.textContent="コピーしました";
      setTimeout(function(){btn.classList.remove("done");btnLabel.textContent="コピーする";},1600);
    }
    function fallback(){
      var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
      document.body.appendChild(ta);ta.focus();ta.select();
      try{document.execCommand("copy");done();}catch(e){}
      document.body.removeChild(ta);
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    }else{fallback();}
  });

  build();
})();
</script>
</body>
</html>
